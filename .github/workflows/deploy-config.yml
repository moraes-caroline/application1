name: Deploy AppConfig

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: sa-east-1

      - name: Create AppConfig Version
        run: |
          aws appconfig create-hosted-configuration-version \
            --application-id ${{ secrets.APPCONFIG_APP_ID }} \
            --configuration-profile-id ${{ secrets.APPCONFIG_PROFILE_ID }} \
            --content file://config/appconfig.json \
            --content-type "application/json"

      - name: Deploy Configuration
        run: |
          aws appconfig start-deployment \
            --application-id ${{ secrets.APPCONFIG_APP_ID }} \
            --environment-id ${{ secrets.APPCONFIG_ENV_ID }} \
            --configuration-profile-id ${{ secrets.APPCONFIG_PROFILE_ID }} \
            --configuration-version "latest" \
            --deployment-strategy-id "AppConfig.AllAtOnce"
